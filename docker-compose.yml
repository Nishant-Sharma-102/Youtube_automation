# Documentary channel daily auto-upload — EC2-friendly deployment.
#   docker compose up -d --build           # start the 08:00 IST daily scheduler
#   docker compose run --rm documentary once  # produce + publish one episode now (test)
#   docker compose logs -f                 # watch runs
services:
  documentary:
    build: .
    image: documentary-daily:latest
    # Always build locally from ./Dockerfile; never try to pull from a registry
    # (the image is not published anywhere — pulling gives "access denied").
    pull_policy: build
    container_name: documentary-daily
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata            # 08:00 here = 08:00 IST; change for another region
      DOC_PUBLISH_PRIVACY: public # public | unlisted | private
      DOC_FFMPEG: ffmpeg          # container ships system ffmpeg; overrides host .env path
    volumes:
      # --- secrets (read-only) — ONE .env holds everything (shared + DOC_* + token).
      # config.py and the orchestrator both fall back to the root .env, so a single
      # file is enough; must exist on the host next to this compose file. ---
      - ./.env:/app/.env:ro
      # (Optional) split channel secrets into their own file instead — if you create it,
      # uncomment this and it overrides matching keys from the root .env:
      # - ./documentary/.env:/app/documentary/.env:ro
      # If you use the Google Cloud TTS fallback / Sheet, also mount its service-account
      # JSON at the path DOC_SERVICE_ACCOUNT_JSON points to, e.g.:
      # - ./documentary/service-account.json:/app/documentary/service-account.json:ro
      # --- persistent episode output (survives container recreation) ---
      - ./documentary/data:/app/documentary/data
      - ./documentary/images:/app/documentary/images
      - ./documentary/renders:/app/documentary/renders
      - ./documentary/audio:/app/documentary/audio
      - ./documentary/music:/app/documentary/music
      - ./documentary/logs:/app/documentary/logs
      - ./logs:/app/logs
